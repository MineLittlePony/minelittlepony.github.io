<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
    window.addEventListener("load", async () => {
        function sortMavenVersion(a, b) {
            let partsA = a.split('.');
            let partsB = b.split('.');
            for (let i = 0; i < Math.min(partsA.length, partsB.length); i++) {
                let partA = parseInt(partsA[i]);
                let partB = parseInt(partsB[i]);

                if (partA > partB) {
                    return -1;
                } else if (partA < partB) {
                    return 1;
                }
            }
            return partsB.length - partsA.length;
        }

        try {
            let githubProjects = [
                new Github("MineLittlePony", "MineLittlePony"),
                new Github("MineLittlePony", "HDSkins")

            ];
            let projects = [];
            for (const p of githubProjects) {
                let releases = []
                for await (const r of p.releases()) {
                    releases.push(r);
                }


                let releasesBySection = arrangeGithubReleasesByMinecraftVersion(releases);
                let sections = [];
                for (const mcversion of Object.keys(releasesBySection).sort(sortMavenVersion)) {
                    if (releasesBySection.hasOwnProperty(mcversion)) {
                        sections.push(new Section(mcversion, releasesBySection[mcversion].map(r => new Version(r))));
                    }
                }
                projects.push(new Project(p.project, sections));
            }

            let downloads = new Downloads(projects);
            downloads.init();

            new HistoryHandler(downloads);

        } catch (e) {
            console.error(e);
            let error = document.createElement("p");
            error.innerText = e;
            document.getElementById("content").appendChild(error);
        }
        document.getElementById("loading").remove()
    });

</script>
